<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
        />
        <title>Bittle X Robot</title>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100vh;
                overflow: hidden;
                width: 100%;
                display: flex;
                position: relative;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
            #threejs {
                height: 100vh;
                flex: 1;
            }
        </style>
        <link rel="stylesheet" href="editor.css" />
    </head>
    <body>
        <div class="header-logos">
            <div id="petoi-logo-container">
                <a href="https://petoi.com/" target="_blank">
                    <img
                        src="/petoi_logo.avif"
                        alt="Petoi Logo"
                        id="petoi-logo-img"
                    />
                </a>
            </div>
            <div class="collaboration-separator">X</div>
            <div id="ape-logo">
                <a href="mailto:jn.sapiens@gmail.com">APE</a>
            </div>
        </div>
        <div class="container">
            <div class="file-bar" id="fileBar">
                <div class="file-tab-scroll" id="fileTabScroll">
                    <!-- file tabs go here -->
                </div>
                <div class="file-bar-actions" id="fileBarActions">
                    <button class="run-button" id="runButton">
                        <span>🔨</span>
                        <span>Compile</span>
                    </button>
                    <!--<button
                        class="stop-button"
                        id="stopButton"
                        disabled="true"
                    >
                        <span>⏹</span>
                        <span>Reset</span>
                    </button>-->
                </div>
            </div>
            <div id="editor"></div>
            <div id="realtimeRatio">1.0</div>
            <div class="build-output" id="buildOutput">
                <button class="close-output" id="closeOutput">×</button>
                <div id="outputContent"></div>
                <div id="serialMonitor"></div>
            </div>
            <div class="serial-input-bar" id="serialInputBar">
                <input
                    class="serial-input"
                    id="serialInput"
                    type="text"
                    placeholder="serial monitor input..."
                    autocomplete="off"
                    spellcheck="false"
                />
                <button
                    class="serial-send"
                    id="serialSend"
                    title="Send (Enter)"
                >
                    Send
                </button>
            </div>
        </div>
        <div id="threejs"></div>
        <script src="index.js"></script>
        <script src="editor.js"></script>
    </body>
</html>
