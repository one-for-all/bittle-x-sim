<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
        />
        <title>Bittle X Robot</title>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                height: 100vh;
                overflow: hidden;
                width: 100%;
                display: flex;
                position: relative;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }
        </style>
        <link rel="stylesheet" href="css/main.css" />
        <link rel="stylesheet" href="css/project-sidebar.css" />
        <link rel="stylesheet" href="css/new-project-dialog.css" />
        <link rel="stylesheet" href="css/explorer.css" />
        <link rel="stylesheet" href="css/editor.css" />
        <link rel="stylesheet" href="css/sim.css" />
        <link rel="stylesheet" href="css/serial-monitor.css" />
        <link rel="stylesheet" href="css/overlay.css" />
    </head>
    <body>
        <div class="main-wrapper">
            <!-- Project sidebar (very left) -->
            <div class="project-sidebar">
                <button
                    class="project-dialog-button"
                    id="projectDialogButton"
                    title="Project Dialog"
                >
                    +
                </button>
                <button
                    class="toggle-explorer-button"
                    id="toggleExplorerButton"
                    title="Toggle Explorer"
                >
                    ☰
                </button>
            </div>
            <!-- Project dialog -->
            <div class="project-dialog hidden" id="projectDialog">
                <div class="dialog-header">Create Project</div>
                <button class="create-project-btn" id="createProjectBtn">
                    New Project
                </button>
            </div>
            <!-- File explorer -->
            <div class="explorer" id="explorer">
                <div class="explorer-header">Files</div>
                <div class="explorer-files" id="explorerFiles"></div>
            </div>
            <div class="editor-container">
                <div class="file-bar" id="fileBar">
                    <div class="file-tab-scroll" id="fileTabScroll">
                        <!-- file tabs go here -->
                    </div>
                    <div class="file-bar-actions" id="fileBarActions">
                        <button class="run-button" id="runButton">
                            <span>🔨</span>
                            <span>Compile</span>
                        </button>
                    </div>
                </div>
                <div id="editor"></div>
            </div>
            <!--resize the width of editor container -->
            <div class="main-resize-handle" id="mainResizeHandle"></div>
            <!--robot simulation view with serial monitor -->
            <div id="threejs">
                <div class="build-output" id="buildOutput">
                    <button class="close-output" id="closeOutput">×</button>
                    <div id="outputContent"></div>
                    <div id="serialMonitor"></div>
                </div>
                <div class="serial-input-bar" id="serialInputBar">
                    <input
                        class="serial-input"
                        id="serialInput"
                        type="text"
                        placeholder="serial monitor input..."
                        autocomplete="off"
                        spellcheck="false"
                    />
                    <button
                        class="serial-send"
                        id="serialSend"
                        title="Send (Enter)"
                    >
                        Send
                    </button>
                </div>
            </div>
            <!--UI componenets that float above everying else-->
            <div class="overlay">
                <div class="header-logos">
                    <div id="petoi-logo-container">
                        <a href="https://petoi.com/" target="_blank">
                            <img
                                src="petoi_logo.avif"
                                alt="Petoi Logo"
                                id="petoi-logo-img"
                            />
                        </a>
                    </div>
                    <div class="collaboration-separator">X</div>
                    <div id="ape-logo">
                        <a href="mailto:jn.sapiens@gmail.com">APE</a>
                    </div>
                </div>
                <div id="realtimeRatio">realtime rate: 1.0</div>
                <div class="movement-button-container">
                    <button class="movement-button" id="backflipButton">
                        backflip
                    </button>
                    <button class="movement-button" id="trotButton">
                        trot
                    </button>
                    <button class="movement-button" id="backwardButton">
                        backward
                    </button>
                    <button class="movement-button" id="beTableButton">
                        be table
                    </button>
                </div>
            </div>
        </div>
        <script src="bundle.js"></script>
    </body>
</html>
